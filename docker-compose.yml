# =============================================================================
# Docker Compose - Prediction Market (Development)
# Provides MongoDB, Redis, and Mongo Express for local development
# =============================================================================

version: '3.8'

services:
  # ---------------------------------------------------------------------------
  # MongoDB - Primary Database
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7
    container_name: pm-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: prediction-market
    networks:
      - pm-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/prediction-market --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Redis - Cache and Rate Limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pm-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - pm-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Mongo Express - MongoDB Admin UI (Development Only)
  # ---------------------------------------------------------------------------
  mongo-express:
    image: mongo-express:latest
    container_name: pm-mongo-express
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH_ENABLED: 'false'
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - pm-network

networks:
  pm-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  redis_data:
    driver: local
